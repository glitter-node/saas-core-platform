<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace Sign-In | SaaS Core Platform</title>
  <meta name="description" content="Sign in to an existing organization workspace with a secure email link.">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#111827">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-page="user-login">
  <div class="site-shell">
    <section class="auth-panel">
      <div>
        <p class="eyebrow">Workspace Sign-In</p>
        <h1>Sign in to this workspace.</h1>
        <p class="hero-copy">Enter your email to receive a sign-in link for this workspace. If your organization has prepared access for this workspace, the link will complete your sign-in.</p>
      </div>
      <form id="user-login-form" class="auth-form">
        <label class="field">
          <span>Email</span>
          <input name="email" type="email" required>
        </label>
        <button class="button button-primary" type="submit">Email sign-in link</button>
        <p id="user-login-status" class="status-line"></p>
      </form>
      <div class="aux-links">
        <a href="/">Back to landing</a>
      </div>
    </section>
  </div>
  <script src="/web-config.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
