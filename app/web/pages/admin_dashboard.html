<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-page="admin-dashboard">
  <div class="site-shell dashboard-shell">
    <header class="dashboard-header">
      <div>
        <p class="eyebrow">Platform Admin Dashboard</p>
        <h1>Operational metrics</h1>
      </div>
      <div class="header-actions">
        <button id="admin-refresh-button" class="button button-secondary" type="button">Refresh data</button>
        <button id="admin-logout-button" class="button button-ghost" type="button">Logout</button>
      </div>
    </header>
    <section class="dashboard-grid">
      <article class="metric-card">
        <p class="entry-label">Overview</p>
        <pre id="admin-overview-output" class="json-box"></pre>
      </article>
      <article class="metric-card">
        <p class="entry-label">Revenue</p>
        <pre id="admin-revenue-output" class="json-box"></pre>
      </article>
      <article class="metric-card span-two">
        <p class="entry-label">Recent tenants</p>
        <pre id="admin-tenants-output" class="json-box"></pre>
      </article>
    </section>
    <p id="admin-dashboard-status" class="status-line"></p>
  </div>
  <script src="/web-config.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
